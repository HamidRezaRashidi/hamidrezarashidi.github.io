<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <rect width="600" height="450" fill="#fde8ec"/>
  <!-- brick facade -->
  <g>
    <rect x="100" y="80" width="400" height="300" fill="#C8102E"/>
    <!-- mortar lines -->
    <g stroke="#9a0b22" stroke-width="1">
      <line x1="100" y1="110" x2="500" y2="110"/>
      <line x1="100" y1="140" x2="500" y2="140"/>
      <line x1="100" y1="170" x2="500" y2="170"/>
      <line x1="100" y1="200" x2="500" y2="200"/>
      <line x1="100" y1="230" x2="500" y2="230"/>
      <line x1="100" y1="260" x2="500" y2="260"/>
      <line x1="100" y1="290" x2="500" y2="290"/>
      <line x1="100" y1="320" x2="500" y2="320"/>
      <line x1="100" y1="350" x2="500" y2="350"/>
    </g>
    <!-- windows (boarded) -->
    <g fill="#1a1a20">
      <rect x="150" y="140" width="70" height="90"/>
      <rect x="265" y="140" width="70" height="90"/>
      <rect x="380" y="140" width="70" height="90"/>
      <rect x="150" y="260" width="70" height="90"/>
      <rect x="265" y="260" width="70" height="90"/>
      <rect x="380" y="260" width="70" height="90"/>
    </g>
    <!-- retrofit anchors -->
    <g fill="#ffffff" stroke="#1a1a20" stroke-width="1">
      <circle cx="140" cy="120" r="5"/>
      <circle cx="460" cy="120" r="5"/>
      <circle cx="140" cy="245" r="5"/>
      <circle cx="460" cy="245" r="5"/>
      <circle cx="140" cy="370" r="5"/>
      <circle cx="460" cy="370" r="5"/>
    </g>
  </g>
  <!-- ground -->
  <rect x="0" y="380" width="600" height="70" fill="#f0d9dd"/>
</svg>
