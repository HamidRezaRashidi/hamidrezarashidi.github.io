<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <rect width="600" height="420" rx="14" fill="#0f0f14"/>

  <!-- drawing sheet -->
  <g>
    <rect x="70" y="40" width="460" height="340" rx="8" fill="#ffffff"/>
    <rect x="82" y="52" width="436" height="280" fill="none" stroke="#d0d0d7"/>
    <!-- title block -->
    <rect x="82" y="336" width="436" height="32" fill="#f5f5f7" stroke="#d0d0d7"/>
    <text x="96" y="357" font-family="Inter, sans-serif" font-size="11" fill="#1a1a20" font-weight="700">MAPLE STRUCTURAL &#183; S-101 &#183; FOUNDATION PLAN</text>
    <text x="454" y="357" font-family="Inter, sans-serif" font-size="11" fill="#6a6a72">1/4" = 1'-0"</text>

    <!-- plan linework -->
    <g stroke="#1a1a20" stroke-width="1.2" fill="none">
      <rect x="120" y="80" width="360" height="230"/>
      <line x1="200" y1="80" x2="200" y2="310"/>
      <line x1="300" y1="80" x2="300" y2="310"/>
      <line x1="400" y1="80" x2="400" y2="310"/>
      <line x1="120" y1="170" x2="480" y2="170"/>
      <line x1="120" y1="240" x2="480" y2="240"/>
    </g>
    <g fill="#1a1a20">
      <circle cx="200" cy="170" r="4"/>
      <circle cx="300" cy="170" r="4"/>
      <circle cx="400" cy="170" r="4"/>
      <circle cx="200" cy="240" r="4"/>
      <circle cx="300" cy="240" r="4"/>
      <circle cx="400" cy="240" r="4"/>
    </g>

    <!-- stamp -->
    <g transform="translate(400,210)">
      <circle r="50" fill="none" stroke="#C8102E" stroke-width="2"/>
      <circle r="40" fill="none" stroke="#C8102E" stroke-width="1"/>
      <text text-anchor="middle" y="-8" font-family="Inter, sans-serif" font-size="8" fill="#C8102E" font-weight="700">LICENSED</text>
      <text text-anchor="middle" y="4" font-family="Fraunces, serif" font-size="11" fill="#C8102E" font-weight="700">P.E.</text>
      <text text-anchor="middle" y="18" font-family="Inter, sans-serif" font-size="7" fill="#C8102E" font-weight="700">MAPLE STRUCTURAL</text>
    </g>
  </g>
</svg>
